name: PyDPF-Post testing # zizmor: ignore[concurrency-limits] , this is a reusable workflow

on:
# Can be called by the CI
  workflow_call:
    inputs:
      post_branch:
        default: 'main'
        type: string
      ANSYS_VERSION:
        required: false
        type: string
      standalone_suffix:
        description: "Suffix of the branch on standalone"
        required: false
        type: string
        default: ''
      test_docstrings:
        description: "whether to run doctest"
        required: false
        type: string
        default: "false"
    secrets:
      LICENSE_SERVER:
        required: true
      PYANSYS_CI_BOT_TOKEN:
        required: true
# Can be called manually
  workflow_dispatch:
    inputs:
      post_branch:
        description: 'PyDPF-Post branch or tag to test. Set to `latest` to get latest tagged version'
        default: 'main'
        type: string
      ANSYS_VERSION:
        description: "ANSYS version"
        required: false
        type: string
      standalone_suffix:
        description: "Suffix of the branch on standalone"
        required: false
        type: string
        default: ''
      test_docstrings:
        description: "whether to run doctest"
        required: false
        type: string
        default: "false"

env:
  PACKAGE_NAME: ansys-dpf-core
  MODULE: core

permissions: {}

jobs:
  Clone_and_Test:
    name: Clone and Test
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read # Required for checkout
      pull-requests: write # Required for posting test outcome comments
    strategy:
      fail-fast: false
      matrix:
        os: ["windows-latest", "ubuntu-latest"]
        python-version: ["3.10"]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: "Set licensing if necessary"
        if: ${{ (inputs.ANSYS_VERSION || vars.ANSYS_VERSION_DEFAULT) > '231' }}
        shell: bash
        env:
          LICENSE_SERVER: ${{ secrets.LICENSE_SERVER }}
        run: |
          echo "ANSYS_DPF_ACCEPT_LA=Y" >> $GITHUB_ENV
          echo "ANSYSLMD_LICENSE_FILE=1055@${LICENSE_SERVER}" >> $GITHUB_ENV
          echo "DPF_DEFAULT_GRPC_MODE=insecure" >> $GITHUB_ENV

      - name: "Setup Python"
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: "Install ansys-dpf-core build requirements"
        run: |
          pip install -U pip
          pip install --group build

      - name: "Build ansys-dpf-core wheel"
        shell: bash
        env:
          MATRIX_OS: ${{ matrix.os }}
        run: |
          if [[ "${MATRIX_OS}" == *"ubuntu"* ]]; then
              export platform="manylinux_2_17"
          else
              export platform="win"
          fi
          python .ci/build_wheel.py -p $platform -w

      - name: "Expose ansys-dpf-core wheel"
        shell: bash
        id: wheel
        working-directory: dist
        run: |
          export name=`ls ansys_dpf_core*.whl`
          echo ${name}
          echo "wheel_name=${name[0]}" >> $GITHUB_OUTPUT

      - name: "Install ansys-dpf-core wheel"
        shell: bash
        env:
          WHEEL_NAME: ${{ steps.wheel.outputs.wheel_name }}
        run: |
          pip install dist/${WHEEL_NAME}[graphics]

      - name: "Install DPF"
        id: set-server-path
        uses: ansys/pydpf-actions/install-dpf-server@195207a462b23da5645fde44ac685e81b29035a4 # v2.3
        with:
          dpf-standalone-TOKEN: ${{secrets.PYANSYS_CI_BOT_TOKEN}}
          standalone_suffix: ${{ inputs.standalone_suffix }}
          ANSYS_VERSION : ${{ inputs.ANSYS_VERSION || vars.ANSYS_VERSION_DEFAULT }}

      - name: "Check licences of packages"
        uses: ansys/pydpf-actions/check-licenses@195207a462b23da5645fde44ac685e81b29035a4 # v2.3

      - name: "Test import"
        shell: bash
        working-directory: tests
        run: python -c "from ansys.dpf import core"

      - name: "Clone PyDPF-Post"
        shell: bash
        env:
          POST_BRANCH: ${{ inputs.post_branch }}
        run: |
          REPO="https://github.com/ansys/pydpf-post.git"
          BranchName="${POST_BRANCH}"
          echo branch="$BranchName"
          if [ "$BranchName" = 'latest' ];
          then
              BranchName=$(git ls-remote --tags --sort="v:refname" --refs $REPO | tail -n1 | cut -d/ -f3)
          fi
          echo branch=$BranchName
          git clone --single-branch --branch "$BranchName" $REPO

      - name: "Install PyDPF-Post"
        shell: bash
        run: |
          cd pydpf-post
          pip install .
          ls

      - name: "Prepare Testing Environment"
        uses: ansys/pydpf-actions/prepare_tests@195207a462b23da5645fde44ac685e81b29035a4 # v2.3
        with:
          DEBUG: true
          working-directory: pydpf-post

      - name: "List installed packages"
        shell: bash
        run: pip list

      - name: "Test Docstrings"
        id: docstrings
        uses: ansys/pydpf-actions/test_docstrings@195207a462b23da5645fde44ac685e81b29035a4 # v2.3
        with:
          MODULE: post
          PACKAGE_NAME: ansys-dpf-post
          working-directory: pydpf-post/src
        if: inputs.test_docstrings == 'true'
        timeout-minutes: 12
        continue-on-error: true
        
      - uses: mainmatter/continue-on-error-comment@b2606cc5ef2525ec21692999676a19f047e3e082 # v1.2.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          outcome: ${{ steps.docstrings.outcome }}
          test-id: PyDPF-Post docstring tests on ${{ matrix.os }}

      - name: "Test API"
        id: api
        shell: bash
        working-directory: pydpf-post/tests
        run: |
          pytest $DEBUG --maxfail=5 --reruns 2 .
        if: always()
        timeout-minutes: 60
        continue-on-error: true

      - uses: mainmatter/continue-on-error-comment@b2606cc5ef2525ec21692999676a19f047e3e082 # v1.2.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          outcome: ${{ steps.api.outcome }}
          test-id: PyDPF-Post API tests on ${{ matrix.os }}
          
      - name: "Kill all servers"
        uses: ansys/pydpf-actions/kill-dpf-servers@195207a462b23da5645fde44ac685e81b29035a4 # v2.3
