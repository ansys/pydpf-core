name: Release

on:
  release:
    types: [published]
# Can be called manually
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag'
        default: 'latest'
        type: string

env:
  DOCUMENTATION_CNAME: 'dpf.docs.pyansys.com'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  get_latest_tag:
    name: "Get latest release version tag"
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
    outputs:
      version: ${{ steps.step1.outputs.version }}
    steps:
      - id: step1
        name: "Get version tag"
        shell: bash
        run: |
          get_latest_release() {
            curl --silent "https://api.github.com/repos/$1/releases/latest" |
              grep '"tag_name":' |
              sed -E 's/.*"([^"]+)".*/\1/'
          }
          version=$(get_latest_release "ansys/pydpf-core")
          echo $version
          echo "version=$version" >> "$GITHUB_OUTPUT"

  Publish_to_PyPI:
    name: "Publish Release to PyPI"
    runs-on: ubuntu-latest
    needs: get_latest_tag
    permissions:
      id-token: write # Required for OIDC authentication with PyPI
      contents: read
    steps:
      - name: "Download Release Assets"
        uses: robinraju/release-downloader@daf26c55d821e836577a15f77d86ddc078948b05 # v1.12
        with:
          tag: ${{ github.event.inputs.release_tag || needs.get_latest_tag.outputs.version }}
          fileName: "*.whl"
          tarBall: false
          zipBall: false
          out-file-path: "assets"
          extract: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Upload artifacts to PyPI using trusted publisher"
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: "https://upload.pypi.org/legacy/"
          print-hash: true
          packages-dir: assets
          skip-existing: true

  upload_docs_release:
    name: "Upload stable documentation"
    needs: [Publish_to_PyPI, get_latest_tag]
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for deploying documentation to gh-pages
    steps:
      - name: "Download Release Asset - HTML"
        uses: dsaltares/fetch-gh-release-asset@aa2ab1243d6e0d5b405b973c89fa4d06a2d0fff7 # v1.1.2
        with:
          file: HTML-doc-ansys-dpf-core.zip
          token: ${{ secrets.GITHUB_TOKEN }}
          version: ${{ github.event.inputs.release_tag && format('tags/{0}', github.event.inputs.release_tag) || format('tags/{0}', needs.get_latest_tag.outputs.version) }}

      - name: "List downloaded assets"
        shell: bash
        run: |
          ls

      - name: "Upload artifact"
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: HTML-doc-ansys-dpf-core.zip
          path: HTML-doc-ansys-dpf-core.zip

      - name: "Deploy the stable documentation"
        uses: ansys/actions/doc-deploy-stable@7d55ff0b9f67c77dae50a286d711ee1ae27b0a25 # v10.2.12
        with:
          cname: ${{ env.DOCUMENTATION_CNAME }}
          token: ${{ secrets.GITHUB_TOKEN }}
          doc-artifact-name: HTML-doc-ansys-dpf-core.zip
          decompress-artifact: true
          bot-user: ${{ secrets.PYANSYS_CI_BOT_USERNAME }}
          bot-email: ${{ secrets.PYANSYS_CI_BOT_EMAIL }}

  update_ansys_lab_examples:
    permissions:
      contents: write # Required by ansys_lab.yml deploy_examples job for git push
    uses: ./.github/workflows/ansys_lab.yml
    needs: get_latest_tag
    with:
      version: ${{ github.event.inputs.release_tag || needs.get_latest_tag.outputs.version }}
    secrets:
      PYANSYS_CI_BOT_TOKEN: ${{ secrets.PYANSYS_CI_BOT_TOKEN }}
